<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculator</title>
    <link rel="icon" type="image/x-icon" href="../../assets/SKicon.ico">
    <link rel="stylesheet" href="../../assets/lib/normalize.css">
    <link rel="stylesheet" href="../exerciseStyles/exercise3Case3Styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ewert&family=Grandstander:ital,wght@0,100..900;1,100..900&family=Henny+Penny&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Pacifico&family=Playball&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Russo+One&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">

</head>
<body>

    <section id="calBody">
        <div id="name">KASIO</div>
        <div id="display"></div>

        <section id="btnHolder">
                <div class="button numBtn">7</div>
                <div class="button numBtn">8</div>
                <div class="button numBtn">9</div>
                <div class="button deleteBtn">DEL</div>
                <div class="button allClearBtn">AC</div>

                <div class="button numBtn">4</div>
                <div class="button numBtn">5</div>
                <div class="button numBtn">6</div>
                <div class="button operationBtn">x</div>
                <div class="button operationBtn">/</div>

                <div class="button numBtn">1</div>
                <div class="button numBtn">2</div>
                <div class="button numBtn">3</div>
                <div class="button operationBtn">+</div>
                <div class="button operationBtn">-</div>

                <div class="button numBtn">0</div>
                <div class="button numBtn">.</div>
                <div class="button"></div>
                <div class="button equalBtn">=</div>
        </section>

    </section>

<!--*************** calculator logics ***************-->

    <script>

        let numButtons = document.querySelectorAll(".numBtn");
        let operationButtons = document.querySelectorAll(".operationBtn");

        let display = document.getElementById("display");
        let acBtn = document.querySelector(".allClearBtn");
        let delBtn = document.querySelector(".deleteBtn");
        let equalBtn = document.querySelector(".equalBtn");

        let operation = '';
        let num1 = '';
        let num2 = '';

        for (let i = 0; i < numButtons.length; i++) {
            numButtons[i].addEventListener('click', () => {

                if (display.innerText.length <= 14) {
                    display.innerText += numButtons[i].innerText;
                }
            });
        }

        for (let j = 0; j < operationButtons.length; j++) {
            operationButtons[j].addEventListener('click', () => {
                num1 = +display.innerText;
                display.innerText = '';
                operation = operationButtons[j].innerText;
            });
        }


        equalBtn.addEventListener('click', () => {
            let tempTxt = 0;

            if(display.innerText === ''){
                num2 = '';
            }
            else{
                num2 = +display.innerText;
            }

            switch (operation) {
                case '+':
                    tempTxt = num1 + num2;
                    break;
                case '-':
                    tempTxt = num1 - num2;
                    break;
                case 'x':
                    tempTxt = num1 * num2;
                    break;
                case '/':
                    tempTxt = num1 / num2;
                    break;
                default:
                    tempTxt = num2;
                    break;
            }

            num1 = '';
            operation = '';

            console.log(tempTxt);

            if(Number.isNaN(tempTxt)){
                display.innerText = 'Syntax Error';
            }
            else if (tempTxt.toString().length < 14) {
                display.innerText = tempTxt;
            }
            else{
                display.innerText = tempTxt.toExponential(10);
            }
        });

        delBtn.addEventListener('click', () => {
            let tempText = display.innerText;
            display.innerText = '';

            for(let i=0; i<tempText.length-1; i++){
                display.innerText += tempText[i];
            }
        });

        acBtn.addEventListener('click', ()=>{
            operation = '';
            num1 = '';
            num2 = '';
            display.innerText = '';
        });

    </script>

</body>
</html>
