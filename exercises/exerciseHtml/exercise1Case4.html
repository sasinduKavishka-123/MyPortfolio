<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Exercise1 | Title</title>
    <link rel="icon" type="image/x-icon" href="../../assets/SKicon.ico">

    <link rel="stylesheet" href="../../assets/lib/normalize.css">

    <style>

        body{
            overflow-x: hidden;
        }

        section{
            width: 100vw;
            height: 100vh;
        }

        .card{
            width: 100%;
            height: 100%;
        }

        .topics{
            height: 70px;
            background-color: red;
            position: sticky;
            top: 0;
            padding-left: 20px;

            display: flex;
            align-items: center;
            font-size: 0;
        }

        .topics > p{
            font-size: 30px;
            width: fit-content;
            position: relative;
            left: 10px;
            color: white;
            font-family: monospace;
        }

        .contents{
            height: calc(100vh - 70px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0;
        }

        .contents > p{
            color: black;
            font-size: 100px;
            font-family: cursive, system-ui;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #topic1{
            background-color: red;
        }
        #topic2{
            background-color: mediumblue;
        }
        #topic3{
            background-color: #41341b;
        }
        #topic4{
            background-color: #960505;
        }

        #content1{
            background-color: white;
        }
        #content2{
            background-color: lightskyblue;
        }
        #content3{
            background-color: gray;
        }
        #content4{
            background-color: #b64141;
        }

    </style>

</head>
<body>

<section>
    <div class="card">
        <div class="topics" id="topic1">
            <p>Card 1</p>
        </div>
        <div class="contents" id="content1">
            <p>Hello</p>
        </div>
    </div>

    <div class="card">
        <div class="topics" id="topic2">
            <p>Card 2</p>
        </div>
        <div class="contents" id="content2">
            <p>How</p>
        </div>
    </div>

    <div class="card">
        <div class="topics" id="topic3">
            <p>Card 3</p>
        </div>
        <div class="contents" id="content3">
            <p>Are</p>
        </div>
    </div>

    <div class="card">
        <div class="topics" id="topic4">
            <p>Card 4</p>
        </div>
        <div class="contents" id="content4">
            <p>You?</p>
        </div>
    </div>
</section>

</body>
</html>
